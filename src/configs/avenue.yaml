data:
  dataset: "avenue"
  root: "src/dataset/CUHK-avenue"
  train_path: "training_videos"
  test_path: "testing_videos"

video:
  input_type: "video"
  resize_width: 320
  resize_height: 240
  grayscale: true
  blur:
    enabled: true
    kernel_size: 3
  brightness_normalization:
    enabled: false

grid:
  rows: 12
  cols: 16
  ignore_cells: []

cube:
  length: 5
  stride: 1

features:
  motion_method: "frame_diff"
  frame_diff_threshold: 15
  direction_bins: 8
  use_brightness: true

output:
  root: "src/outputs/preprocessed"
  weka_root: "src/outputs/weka"

rules:
  enabled: true
  output_root: "src/outputs/rules"
  model_dir: null
  algorithm: "bounded_apriori"
  min_support: 0.01
  min_confidence: 0.60
  min_lift: 1.05
  max_itemset_size: 3
  max_rules: 200
  include_cell_token: true
  include_cluster_token: true
  include_brightness_token: true
  include_direction_token: false
  rare_itemset_size: 3
  rare_support_floor: 0.001
  rare_score_cap: 1.0

visualization:
  output_root: "src/outputs/visualizations"
  colormap: "JET"
  alpha: 0.45
  heatmap_normalization: "per_frame"
  draw_grid: false
  draw_top_cells: true
  top_cells_per_frame: 5
  top_frames: 30
  min_score: 0.70
  frame_source: "preprocessed"
  image_format: "png"
  video_fps: 10
