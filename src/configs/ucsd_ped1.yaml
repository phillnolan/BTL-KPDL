data:
  dataset: "ucsd_ped1"
  root: "src/dataset/UCSD_Anomaly_Dataset.v1p2/UCSDped1"
  train_path: "Train"
  test_path: "Test"

video:
  input_type: "frame_sequence"
  resize_width: 320
  resize_height: 240
  grayscale: true
  blur:
    enabled: true
    kernel_size: 3
  brightness_normalization:
    enabled: false

grid:
  rows: 12
  cols: 16
  ignore_cells: []

cube:
  length: 5
  stride: 1

features:
  motion_method: "frame_diff"
  frame_diff_threshold: 15
  direction_bins: 8
  use_brightness: true

output:
  root: "src/outputs/preprocessed"
  weka_root: "src/outputs/weka"

visualization:
  output_root: "src/outputs/visualizations"
  colormap: "JET"
  alpha: 0.45
  heatmap_normalization: "per_frame"
  draw_grid: false
  draw_top_cells: true
  top_cells_per_frame: 5
  top_frames: 30
  min_score: 0.70
  frame_source: "preprocessed"
  image_format: "png"
  video_fps: 10
